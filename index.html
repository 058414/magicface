<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MagicFace — Análise Facial</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a; color: #f0f0f0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
}

header {
  width: 100%; padding: 14px 20px; background: #111;
  border-bottom: 1px solid #222; text-align: center;
}
header h1 { font-size: 1.3rem; color: #C4973A; letter-spacing: 3px; font-weight: 700; }
header p  { font-size: 0.7rem; color: #555; margin-top: 3px; letter-spacing: 1px; }

.section { width: 100%; max-width: 480px; padding: 16px 16px 32px; display: none; }
.section.active { display: block; }

/* ── CÂMERA ── */
#camera-wrap {
  position: relative; width: 100%; aspect-ratio: 3/4;
  background: #000; border-radius: 16px; overflow: hidden;
  margin-bottom: 14px; border: 1.5px solid #1a1a1a;
}

#video {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1); display: block;
}

/* Canvas da máscara — cobre todo o wrap */
#mask-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Cruz de centralização */
#cross-h, #cross-v {
  position: absolute; pointer-events: none;
  transition: opacity 0.5s;
}
#cross-h { left: 8%; right: 8%; top: 50%; height: 1px; background: rgba(255,255,255,0.25); }
#cross-v { top: 8%; bottom: 8%; left: 50%; width: 1px; background: rgba(255,255,255,0.25); }
#cross-dot {
  position: absolute; left: 50%; top: 50%;
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
  transform: translate(-50%,-50%); pointer-events: none;
  transition: opacity 0.5s;
}
.hide { opacity: 0 !important; }

/* Countdown */
#countdown-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
#countdown-overlay.visible { opacity: 1; }
#countdown-num {
  font-size: 7rem; font-weight: 900; color: #fff;
  text-shadow: 0 0 20px #FFD700, 0 0 50px rgba(255,215,0,0.5);
  animation: numPop 0.4s ease-out;
}
@keyframes numPop { from { transform: scale(1.5); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }

/* Flash */
#flash {
  position: absolute; inset: 0; background: #fff; opacity: 0;
  pointer-events: none; border-radius: 14px;
}
#flash.bang { animation: flashOut 0.45s ease-out forwards; }
@keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

/* Status */
#status-text {
  text-align: center; font-size: 0.82rem; color: #888;
  min-height: 20px; margin-bottom: 12px;
  transition: color 0.3s; letter-spacing: 0.5px;
}
#status-text.ok   { color: #FFD700; }
#status-text.hint { color: #aaa; }

/* Loading MediaPipe */
#mp-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); color: #aaa; font-size: 0.8rem;
  gap: 12px; border-radius: 14px;
}
#mp-loading .spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #333; border-top-color: #C4973A;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Botões */
.btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.5px;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: #C4973A; color: #fff; }
.btn-ghost   { background: transparent; color: #555; border: 1px solid #2a2a2a; margin-top: 10px; font-size: 0.8rem; }
#btn-manual  { display: none; }

/* ── MEIAS FACES ── */
.faces-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
.face-card { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
.face-card canvas { width: 100%; aspect-ratio: 1; border-radius: 10px; border: 1px solid #222; display: block; }
.face-card canvas.destaque { border-color: #C4973A33; }
.face-lbl { font-size: 0.58rem; color: #555; text-align: center; line-height: 1.5; text-transform: uppercase; letter-spacing: 0.5px; }
.section-title { font-size: 0.7rem; color: #C4973A; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

/* ── QUIZ ── */
#chat { display: flex; flex-direction: column; gap: 10px; min-height: 200px; }
.msg { max-width: 88%; padding: 11px 15px; border-radius: 14px; font-size: 0.88rem; line-height: 1.5; animation: fadeUp 0.3s ease; }
.msg.bot { background: #181818; border: 1px solid #262626; align-self: flex-start; color: #ccc; }
.msg.user-resp { background: #1e1a10; border: 1px solid #C4973A33; align-self: flex-end; color: #C4973A; font-style: italic; }
.opts-wrap { display: flex; flex-direction: column; gap: 8px; animation: fadeUp 0.3s ease; }
.opt {
  background: #141414; border: 1px solid #2a2a2a; color: #bbb;
  padding: 11px 15px; border-radius: 10px; cursor: pointer;
  font-size: 0.85rem; text-align: left; width: 100%;
  transition: border-color 0.2s, background 0.2s, color 0.2s;
}
.opt:hover { border-color: #C4973A; background: #1e1a10; color: #C4973A; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── RESULTADO ── */
.resultado-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.resultado-card h3 { font-size: 0.68rem; color: #C4973A; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #1e1e1e; }
.resultado-card p { font-size: 0.83rem; color: #bbb; line-height: 1.65; }
.resultado-card p + p { margin-top: 8px; }
.tag { display: inline-block; background: #1e1a10; border: 1px solid #C4973A33; color: #C4973A; font-size: 0.68rem; padding: 3px 9px; border-radius: 20px; margin: 3px 3px 6px 0; }
#json-raw { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 10px; padding: 14px; font-size: 0.68rem; line-height: 1.7; color: #5a9; white-space: pre-wrap; word-break: break-all; max-height: 280px; overflow-y: auto; margin-bottom: 12px; display: none; }
#btn-toggle-json { width: 100%; padding: 10px; background: transparent; border: 1px solid #222; color: #444; border-radius: 8px; font-size: 0.76rem; cursor: pointer; margin-bottom: 10px; transition: color 0.2s; }
#btn-toggle-json:hover { color: #777; }
</style>
</head>
<body>

<header>
  <h1>MAGICFACE</h1>
  <p>análise de assimetria facial</p>
</header>

<!-- CÂMERA -->
<div class="section active" id="sec-camera">
  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="mask-canvas"></canvas>
    <div id="cross-h"></div>
    <div id="cross-v"></div>
    <div id="cross-dot"></div>
    <div id="mp-loading">
      <div class="spinner"></div>
      <span>Carregando câmera...</span>
    </div>
    <div id="countdown-overlay"><span id="countdown-num">3</span></div>
    <div id="flash"></div>
  </div>
  <p id="status-text" class="hint">Centralize seu rosto</p>
  <button class="btn btn-primary" id="btn-manual">📸 Tirar Foto</button>
</div>

<!-- EDUCAÇÃO (Ancestralidade) -->
<div class="section" id="sec-education">
  <p class="section-title">Entenda seu Rosto</p>
  <div id="education-content"></div>
  <button class="btn btn-primary" id="btn-prosseguir-analise">Continuar →</button>
  <button class="btn btn-ghost" id="btn-refazer-edu">Tirar nova foto</button>
</div>

<!-- MEIAS FACES -->
<div class="section" id="sec-faces">
  <p class="section-title">Análise Visual</p>
  <div class="faces-row">
    <div class="face-card">
      <canvas id="rightDupCanvas" width="250" height="250"></canvas>
      <span class="face-lbl">Lado Direito<br>+ Lado Direito</span>
    </div>
    <div class="face-card">
      <canvas id="origCanvas" width="250" height="250" class="destaque"></canvas>
      <span class="face-lbl" style="color:#555">Normal</span>
    </div>
    <div class="face-card">
      <canvas id="leftDupCanvas" width="250" height="250"></canvas>
      <span class="face-lbl">Lado Esquerdo<br>+ Lado Esquerdo</span>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-comecar-quiz">Iniciar Análise →</button>
  <button class="btn btn-ghost"   id="btn-refazer">Tirar nova foto</button>
</div>

<!-- QUIZ -->
<div class="section" id="sec-quiz">
  <p class="section-title">Questionário</p>
  <div id="chat"></div>
</div>

<!-- RESULTADO -->
<div class="section" id="sec-result">
  <p class="section-title">Resultado da Análise</p>
  <div id="cards-resultado"></div>
  <button id="btn-toggle-json">{ } Ver JSON completo</button>
  <pre id="json-raw"></pre>
  <button class="btn btn-primary" id="btn-copiar-json">Copiar JSON</button>
  <button class="btn btn-ghost"   id="btn-nova-analise">Nova Análise</button>
</div>

<script type="module">
// ─────────────────────────────────────────────
//  LANDMARKS DA MÁSCARA (índices MediaPipe 468)
// ─────────────────────────────────────────────
const FACE_OVAL   = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
const LEFT_EYE    = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
const RIGHT_EYE   = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
const LEFT_BROW   = [276,283,282,295,285,336,296,334,293,300];
const RIGHT_BROW  = [46,53,52,65,55,107,66,105,63,70];
const NOSE_BRIDGE = [168,6,197,195,5,4,1,19,94];
const NOSE_BASE   = [218,115,220,45,4,275,220,343,218];
const LIPS_OUTER  = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const LIPS_INNER  = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];

// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
const S = { stream: null, capturedImg: null, quiz: {}, resultado: null };
let ultimosLandmarks = null;

// ─────────────────────────────────────────────
//  ELEMENTOS
// ─────────────────────────────────────────────
const video      = document.getElementById('video');
const maskCanvas = document.getElementById('mask-canvas');
const crossH     = document.getElementById('cross-h');
const crossV     = document.getElementById('cross-v');
const crossDot   = document.getElementById('cross-dot');
const statusText = document.getElementById('status-text');
const cdOverlay  = document.getElementById('countdown-overlay');
const cdNum      = document.getElementById('countdown-num');
const flashEl    = document.getElementById('flash');
const cameraWrap = document.getElementById('camera-wrap');
const mpLoading  = document.getElementById('mp-loading');
const btnManual  = document.getElementById('btn-manual');

// ─────────────────────────────────────────────
//  NAVEGAÇÃO
// ─────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
//  CÂMERA
// ─────────────────────────────────────────────
async function iniciarCamera() {
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    video.srcObject = S.stream;
    await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
    ajustarCanvas();
    await iniciarMediaPipe();
    mpLoading.style.display = 'none';
  } catch (e) {
    mpLoading.style.display = 'none';
    statusText.textContent = 'Câmera indisponível — use o botão';
    btnManual.style.display = 'block';
  }
}

function pararCamera() {
  if (S.stream) { S.stream.getTracks().forEach(t => t.stop()); S.stream = null; }
  pararLoop();
}

function ajustarCanvas() {
  maskCanvas.width  = cameraWrap.clientWidth;
  maskCanvas.height = cameraWrap.clientHeight;
}
window.addEventListener('resize', ajustarCanvas);

// ─────────────────────────────────────────────
//  MEDIAPIPE FACE LANDMARKER
// ─────────────────────────────────────────────
let faceLandmarker = null;
let rafId = null;
let emContagem = false, cdTimer = null, okFrames = 0;
const lerp = (a, b, t) => a + (b - a) * t;
let encaixado = false;

async function iniciarMediaPipe() {
  const { FaceLandmarker, FilesetResolver } = await import(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs'
  );
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm'
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numFaces: 1,
    minFaceDetectionConfidence: 0.5,
    minFacePresenceConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  loopLandmarks();
}

function pararLoop() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

let lastTs = 0;
function loopLandmarks() {
  rafId = requestAnimationFrame(ts => {
    if (!S.stream) return;
    if (faceLandmarker && ts - lastTs > 80) {
      lastTs = ts;
      try {
        const res = faceLandmarker.detectForVideo(video, ts);
        if (res.faceLandmarks && res.faceLandmarks.length > 0) {
          ultimosLandmarks = res.faceLandmarks[0];
          processarRosto(ultimosLandmarks);
        } else {
          semRosto();
        }
      } catch (_) {}
    }
    loopLandmarks();
  });
}

// ─────────────────────────────────────────────
//  PROCESSAR ROSTO
// ─────────────────────────────────────────────
function processarRosto(landmarks) {
  // Ocultar cruz
  crossH.classList.add('hide');
  crossV.classList.add('hide');
  crossDot.classList.add('hide');

  // Verificar centralização
  const dw = maskCanvas.width, dh = maskCanvas.height;
  let sumX = 0, sumY = 0;
  for (const lm of landmarks) { sumX += lm.x; sumY += lm.y; }
  const cx = 1 - (sumX / landmarks.length); // invertido (espelhamento)
  const cy = sumY / landmarks.length;

  // Tamanho do rosto (span horizontal)
  let minX = 1, maxX = 0;
  for (const lm of landmarks) { minX = Math.min(minX, lm.x); maxX = Math.max(maxX, lm.x); }
  const largura = (maxX - minX) * dw;

  const centralH = Math.abs(cx - 0.5) < 0.07;
  const centralV = Math.abs(cy - 0.44) < 0.07;
  const tamanho  = largura > dw * 0.32 && largura < dw * 0.78;

  if (centralH && centralV && tamanho) {
    okFrames++;
    encaixado = true;
    statusText.textContent = 'Perfeito! Segure firme...';
    statusText.className = 'ok';
    if (okFrames >= 5 && !emContagem) iniciarContagem();
  } else {
    okFrames = 0;
    encaixado = false;
    if (!emContagem) cancelarContagem();

    const offH = cx - 0.5;
    const offV = cy - 0.44;

    if (largura < dw * 0.3) {
      statusText.textContent = 'Aproxime-se da câmera';
    } else if (largura > dw * 0.82) {
      statusText.textContent = 'Afaste-se um pouco';
    } else if (!centralH && !centralV) {
      statusText.textContent = Math.abs(offH) >= Math.abs(offV)
        ? (offH > 0 ? '← Mova para a esquerda' : '→ Mova para a direita')
        : (offV > 0 ? '↑ Mova para cima'        : '↓ Mova para baixo');
    } else if (!centralH) {
      statusText.textContent = offH > 0 ? '← Mova para a esquerda' : '→ Mova para a direita';
    } else if (!centralV) {
      statusText.textContent = offV > 0 ? '↑ Mova para cima' : '↓ Mova para baixo';
    } else {
      statusText.textContent = 'Quase lá...';
    }
    statusText.className = '';
  }

  desenharMascara(landmarks, encaixado);
}

function semRosto() {
  if (emContagem) return;
  ultimosLandmarks = null;
  encaixado = false;
  okFrames = 0;
  // Limpar canvas e mostrar cruz
  const ctx = maskCanvas.getContext('2d');
  ctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  crossH.classList.remove('hide');
  crossV.classList.remove('hide');
  crossDot.classList.remove('hide');
  statusText.textContent = 'Centralize seu rosto';
  statusText.className = 'hint';
}

// ─────────────────────────────────────────────
//  DESENHAR MÁSCARA NOS LANDMARKS
// ─────────────────────────────────────────────
function desenharMascara(landmarks, isEncaixado) {
  const ctx = maskCanvas.getContext('2d');
  const dw  = maskCanvas.width, dh = maskCanvas.height;
  ctx.clearRect(0, 0, dw, dh);

  // Cor: branca ao rastrear, dourada ao centralizar
  const cor    = isEncaixado ? '#FFD700'             : 'rgba(255,255,255,0.7)';
  const corFraca = isEncaixado ? 'rgba(255,215,0,0.5)' : 'rgba(255,255,255,0.35)';

  if (isEncaixado) {
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur  = 7;
  } else {
    ctx.shadowBlur = 0;
  }

  // Converter landmark (normalizado) → pixel no canvas (com espelhamento invertido)
  function p(idx) {
    const lm = landmarks[idx];
    if (!lm) return null;
    return { x: (1 - lm.x) * dw, y: lm.y * dh };
  }

  function path(indices, fechar = false, alpha = 1) {
    const pts = indices.map(i => p(i)).filter(Boolean);
    if (pts.length < 2) return;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    if (fechar) ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Contorno do rosto — oval ajustado para hairline real
  ctx.strokeStyle = cor; ctx.lineWidth = 0.7;
  const pForehead = p(10);  // meio da testa (MediaPipe não tem hairline nativo)
  const pChin     = p(152); // queixo
  const ovalPts   = FACE_OVAL.map(i => p(i)).filter(Boolean);

  if (ovalPts.length > 2 && pForehead && pChin) {
    const faceH = pChin.y - pForehead.y;
    // Ponto 10 fica no meio da testa → hairline está ~22% acima
    const hairOffset = faceH * 0.22;
    const upperLimit = pForehead.y + faceH * 0.28;

    // Mover pontos superiores do oval proporcionalmente para cima até a hairline
    const adjusted = ovalPts.map(pt => {
      if (pt.y < upperLimit) {
        const ratio = 1 - (pt.y - pForehead.y) / (upperLimit - pForehead.y);
        return { x: pt.x, y: pt.y - hairOffset * ratio };
      }
      return pt;
    });

    ctx.globalAlpha = 0.88;
    ctx.beginPath();
    ctx.moveTo(adjusted[0].x, adjusted[0].y);
    for (let i = 1; i < adjusted.length - 1; i++) {
      const mx = (adjusted[i].x + adjusted[i+1].x) / 2;
      const my = (adjusted[i].y + adjusted[i+1].y) / 2;
      ctx.quadraticCurveTo(adjusted[i].x, adjusted[i].y, mx, my);
    }
    ctx.quadraticCurveTo(
      adjusted[adjusted.length-1].x, adjusted[adjusted.length-1].y,
      adjusted[0].x, adjusted[0].y
    );
    ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Sobrancelhas
  ctx.strokeStyle = cor; ctx.lineWidth = 0.65;
  path(LEFT_BROW,  false, 0.9);
  path(RIGHT_BROW, false, 0.9);

  // Olhos
  ctx.strokeStyle = cor; ctx.lineWidth = 0.65;
  path(LEFT_EYE,  true, 0.9);
  path(RIGHT_EYE, true, 0.9);

  // Nariz
  ctx.strokeStyle = corFraca; ctx.lineWidth = 0.5;
  path(NOSE_BRIDGE, false, 0.75);
  path(NOSE_BASE,   false, 0.65);

  // Boca
  ctx.strokeStyle = cor; ctx.lineWidth = 0.65;
  path(LIPS_OUTER, true, 0.9);
  path(LIPS_INNER, true, 0.6);

  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────
//  CONTAGEM
// ─────────────────────────────────────────────
function iniciarContagem() {
  emContagem = true;
  let n = 3;
  cdNum.textContent = n;
  cdOverlay.classList.add('visible');
  cdTimer = setInterval(() => {
    n--;
    if (n > 0) {
      cdNum.style.animation = 'none';
      void cdNum.offsetWidth;
      cdNum.style.animation = '';
      cdNum.textContent = n;
    } else {
      clearInterval(cdTimer);
      cdOverlay.classList.remove('visible');
      dispararCaptura();
    }
  }, 1000);
}

function cancelarContagem() {
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  emContagem = false;
  cdOverlay.classList.remove('visible');
  okFrames = 0;
}

// ─────────────────────────────────────────────
//  CAPTURA COM CROP NO ROSTO
// ─────────────────────────────────────────────
function dispararCaptura() {
  flashEl.classList.remove('bang');
  void flashEl.offsetWidth;
  flashEl.classList.add('bang');

  const tmp = document.createElement('canvas');
  tmp.width = video.videoWidth; tmp.height = video.videoHeight;
  const ctx = tmp.getContext('2d');
  ctx.translate(tmp.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);

  let dataUrl = tmp.toDataURL('image/jpeg', 0.92);

  // Crop automático no rosto usando landmarks
  if (ultimosLandmarks) {
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (const lm of ultimosLandmarks) {
      minX = Math.min(minX, lm.x); maxX = Math.max(maxX, lm.x);
      minY = Math.min(minY, lm.y); maxY = Math.max(maxY, lm.y);
    }
    // Inverter X (espelhamento desfeito na captura)
    const fLeft = (1 - maxX) * tmp.width;
    const fTop  = minY * tmp.height;
    const fW    = (maxX - minX) * tmp.width;
    const fH    = (maxY - minY) * tmp.height;

    // Margem: 18% horizontal, 35% vertical (mais espaço no topo para testa/cabelo)
    const mx = fW * 0.18, myTop = fH * 0.35, myBot = fH * 0.12;
    const cx = Math.max(0, fLeft - mx);
    const cy = Math.max(0, fTop - myTop);
    const cw = Math.min(tmp.width  - cx, fW + mx * 2);
    const ch = Math.min(tmp.height - cy, fH + myTop + myBot);

    const crop = document.createElement('canvas');
    crop.width = cw; crop.height = ch;
    crop.getContext('2d').drawImage(tmp, cx, cy, cw, ch, 0, 0, cw, ch);
    dataUrl = crop.toDataURL('image/jpeg', 0.92);
  }

  S.capturedImg = new Image();
  S.capturedImg.onload = () => {
    pararCamera();
    gerarMeiasFaces();
    setTimeout(() => {
      mostrarEducacao();
      show('sec-education');
    }, 150);
  };
  S.capturedImg.src = dataUrl;
}

function gerarMeiasFaces() {
  const img = S.capturedImg;
  const MAX = 500;
  let w = img.naturalWidth, h = img.naturalHeight;
  if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
  else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }

  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').drawImage(img, 0, 0, w, h);

  const SZ = 250, cx = w / 2;
  const rdupC = document.getElementById('rightDupCanvas').getContext('2d');
  const oc = document.getElementById('origCanvas').getContext('2d');
  const ldupC = document.getElementById('leftDupCanvas').getContext('2d');

  // Original
  oc.clearRect(0,0,SZ,SZ); oc.drawImage(tmp, 0, 0, w, h, 0, 0, SZ, SZ);

  // Lado DIREITO duplicado (lado direito espelhado + lado direito original)
  rdupC.clearRect(0,0,SZ,SZ);
  // Lado direito espelhado (esquerda)
  rdupC.save(); rdupC.translate(SZ/2,0); rdupC.scale(-1,1);
  rdupC.drawImage(tmp, cx, 0, cx, h, 0, 0, SZ/2, SZ); rdupC.restore();
  // Lado direito original (direita)
  rdupC.drawImage(tmp, cx, 0, cx, h, SZ/2, 0, SZ/2, SZ);

  // Lado ESQUERDO duplicado (lado esquerdo original + lado esquerdo espelhado)
  ldupC.clearRect(0,0,SZ,SZ);
  // Lado esquerdo original (esquerda)
  ldupC.drawImage(tmp, 0, 0, cx, h, 0, 0, SZ/2, SZ);
  // Lado esquerdo espelhado (direita)
  ldupC.save(); ldupC.translate(SZ,0); ldupC.scale(-1,1);
  ldupC.drawImage(tmp, 0, 0, cx, h, 0, 0, SZ/2, SZ); ldupC.restore();
}

function mostrarEducacao() {
  const eduContent = document.getElementById('education-content');
  eduContent.innerHTML = '';

  // Pegar a imagem original já gerada
  const origCanvas = document.getElementById('origCanvas');
  const canvas = document.createElement('canvas');
  canvas.width = 250; canvas.height = 250;
  const ctx = canvas.getContext('2d');

  // Copiar a imagem original
  ctx.drawImage(origCanvas, 0, 0, 250, 250);

  // Linha divisória vertical — usando landmarks para encontrar o meio do rosto
  // Landmark 1 é a ponta do nariz (naris)
  let linhaX = 125; // default no meio
  if (ultimosLandmarks && ultimosLandmarks.length > 1) {
    // Converter coordenada normalizada para pixel (e inverter por espelhamento)
    const narizX = 1 - ultimosLandmarks[1].x; // inverte por espelhamento
    linhaX = narizX * 250;
  }

  ctx.strokeStyle = '#C4973A'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(linhaX, 0); ctx.lineTo(linhaX, 250); ctx.stroke();

  const container = document.createElement('div');
  container.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:16px;';

  const canvasContainer = document.createElement('div');
  canvasContainer.style.cssText = 'display:flex; justify-content:center;';
  canvasContainer.appendChild(canvas);

  const text = document.createElement('div');
  text.style.cssText = 'font-size:0.95rem; line-height:1.8; color:#bbb; text-align:center;';
  text.innerHTML = `
    <p style="margin-bottom:16px; font-size:1.1rem;"><strong style="color:#C4973A">Seu rosto conta sua história</strong></p>

    <p style="margin-bottom:14px;">
      Observe a linha que divide seu rosto. Ela marca uma transição importante — cada lado carrega uma herança genética e energética diferente.
    </p>

    <p style="margin-bottom:14px;">
      <span style="color:#C4973A; font-weight:600;">Lado Direito (Herança Paterna)</span><br>
      Este lado reflete características genéticas da linhagem paterna. Ele representa força, estrutura e os traços que você herdou dessa linha ancestral.
    </p>

    <p style="margin-bottom:14px;">
      <span style="color:#C4973A; font-weight:600;">Lado Esquerdo (Herança Materna)</span><br>
      Este lado reflete características genéticas da linhagem materna. Ele carrega sensibilidade, expressão e os traços que você herdou dessa outra linha ancestral.
    </p>

    <p style="margin-bottom:14px;">
      <span style="color:#C4973A; font-weight:600;">A assimetria é seu superpoder</span><br>
      As diferenças entre os dois lados não são imperfeições — são ferramentas poderosas para compensação visual. Um bom corte de cabelo trabalha COM essas diferenças naturais, não contra elas.
    </p>

    <p style="font-size:0.9rem; color:#888;">
      Vamos usar essas informações para encontrar o corte que realmente funciona no seu rosto.
    </p>
  `;

  container.appendChild(canvasContainer);
  container.appendChild(text);
  eduContent.appendChild(container);
}

// ─────────────────────────────────────────────
//  QUIZ
// ─────────────────────────────────────────────
const chatEl = document.getElementById('chat');
const wait   = ms => new Promise(r => setTimeout(r, ms));

async function msg(texto) {
  await wait(320);
  const d = document.createElement('div');
  d.className = 'msg bot'; d.textContent = texto;
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}

function opts(opcoes) {
  return new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = 'opts-wrap';
    opcoes.forEach(op => {
      const btn = document.createElement('button'); btn.className = 'opt'; btn.textContent = op.label;
      btn.addEventListener('click', () => {
        wrap.remove();
        const r = document.createElement('div'); r.className = 'msg user-resp'; r.textContent = op.label;
        chatEl.appendChild(r); chatEl.scrollTop = chatEl.scrollHeight;
        resolve(op.value);
      });
      wrap.appendChild(btn);
    });
    chatEl.appendChild(wrap); chatEl.scrollTop = chatEl.scrollHeight;
  });
}

async function iniciarQuiz() {
  chatEl.innerHTML = ''; S.quiz = {};

  await msg('Olhando as imagens, para você seu rosto está mais para...');
  S.quiz.percepcaoRosto = await opts([
    { label: 'Longo demais', value: 'longo' },
    { label: 'Largo demais', value: 'largo' },
    { label: 'Equilibrado',  value: 'equilibrado' }
  ]);

  if (S.quiz.percepcaoRosto !== 'equilibrado') {
    await msg('Isso te gera algum desconforto?');
    S.quiz.geraDesconforto = await opts([
      { label: 'Sim, me incomoda', value: true },
      { label: 'Não, tranquilo',   value: false }
    ]);
  } else { S.quiz.geraDesconforto = null; }

  await msg('Você usa franja reta ou côncava acima das sobrancelhas?');
  S.quiz.franja = await opts([
    { label: 'Sim — meu rosto ficou mais largo',      value: 'mais_largo' },
    { label: 'Sim — meu rosto equilibra com ela',     value: 'equilibra'  },
    { label: 'Sim — meu nariz fica mais proeminente', value: 'nariz'      },
    { label: 'Não uso franja',                        value: 'nao_usa'    },
    { label: 'Gostaria de usar',                      value: 'gostaria'   }
  ]);

  await msg('Que linhas você considera predominantes no seu rosto?');
  S.quiz.linhasRosto = await opts([
    { label: 'Retas / verticais',     value: 'retas'     },
    { label: 'Curvas / arredondadas', value: 'curvas'    },
    { label: 'Diagonais',             value: 'diagonais' }
  ]);

  await msg('Qual seu biotipo / formato do corpo?');
  S.quiz.biotipo = await opts([
    { label: 'Retângulo',             value: 'retangulo'  },
    { label: 'Pêra',                  value: 'pera'       },
    { label: 'Triângulo invertido',   value: 'triangulo'  },
    { label: 'Ampulheta',             value: 'ampulheta'  },
    { label: 'Oval',                  value: 'oval'       }
  ]);

  await msg('Que linhas predominam no seu corpo?');
  S.quiz.linhasCorpo = await opts([
    { label: 'Retas',                 value: 'retas'     },
    { label: 'Curvas',                value: 'curvas'    },
    { label: 'Mistura',               value: 'mistura'   }
  ]);

  await msg('Analisando seu perfil...'); await wait(850);
  gerarResultado(); show('sec-result');
}

// ─────────────────────────────────────────────
//  REGRAS
// ─────────────────────────────────────────────
function gerarResultado() {
  const q = S.quiz;
  let comp;
  if (q.percepcaoRosto === 'longo' && q.geraDesconforto)
    comp = { direcao:'lado_mais_alto', efeito:'equilíbrio', explicacao:'Observe qual lado aparece mais alto nas imagens. Jogue o cabelo para esse lado, expondo o lado mais baixo e largo. Isso cria equilíbrio instantâneo.' };
  else if (q.percepcaoRosto === 'largo' && q.geraDesconforto)
    comp = { direcao:'lado_mais_baixo', efeito:'projeção vertical', explicacao:'Observe qual lado aparece mais baixo nas imagens. Jogue o cabelo para esse lado, expondo o lado mais alto. Isso cria projeção vertical e afina a percepção do rosto.' };
  else
    comp = { direcao:'ambas_opções', efeito:'ferramenta diária', explicacao:'Seu rosto está equilibrado. Use sua assimetria natural como ferramenta: em dias de inchaço exponha o lado mais alto para alongar; em outros, exponha o lado mais baixo para ampliar.' };

  const franjaMap = {
    mais_largo: 'Compense com gola quadrada ou retangular (linha fria). Meça o tamanho da franja e aplique essa medida para baixo a partir da gola. Evite gola em U.',
    equilibra:  'Atenção: se seu rosto tem linhas curvilíneas, o equilíbrio vem da franja reta quebrando as curvas. Não adicione mais curvas — evite gola em U, brincos e óculos arredondados.',
    nariz:      'O cabelo dividido no meio cria linha vertical que espelha o nariz, gerando ênfase. Jogue o cabelo para o lado — qualquer lado. Isso quebra a linha vertical e reduz o foco no nariz.',
    nao_usa:    null,
    gostaria:   q.linhasRosto === 'curvas' ? 'Com linhas curvas predominando, franja RETA é a melhor opção — linha fria que atenua as curvas.'
              : q.linhasRosto === 'retas'  ? 'Com linhas retas predominando, franja CÔNCAVA pode ser interessante — adiciona curva que quebra a rigidez.'
              :                              'Com diagonais predominando, tanto franja reta quanto côncava funcionam. Escolha pela preferência.'
  };

  const linhasMap = {
    retas:     { classe:'Fria',              alerta:'Evite excesso de retas adicionais — criam rigidez visual.',                    sugestao:'Adicione curvas ou diagonais: gola em U/V, brincos orgânicos, óculos arredondados.' },
    curvas:    { classe:'Quente / Emocional', alerta:'Evite reforçar curvas: gola U, brincos e óculos arredondados amplificam.',    sugestao:'Use linhas frias: gola quadrada ou retangular, brincos geométricos, óculos angulares.' },
    diagonais: { classe:'Dinâmica / Instável',alerta:'Excesso de diagonais gera agitação visual.',                                  sugestao:'Equilibre com retas frias: gola quadrada, brincos verticais simples.' }
  };

  const corpoMap = {
    retangulo:  'Retângulo — Corpo com linhas RETAS. Precisa quebrar com curva/diagonal na cintura.',
    pera:       'Pêra — Largo em baixo. Corte que expanda ombros ou alongue a silhueta.',
    triangulo:  'Triângulo invertido — Largo em cima. Corte que expanda quadril/cintura para equilibrar.',
    ampulheta:  'Ampulheta — Curvas naturais. Reforce a curva com o corte.',
    oval:       'Oval — Versátil. Use linhas retas ou diagonais para afinar.'
  };

  S.resultado = {
    imagens: {
      ladoDireitoDuplicado:    document.getElementById('rightDupCanvas').toDataURL('image/jpeg',0.75),
      original:                document.getElementById('origCanvas').toDataURL('image/jpeg',0.75),
      ladoEsquerdoDuplicado:   document.getElementById('leftDupCanvas').toDataURL('image/jpeg',0.75)
    },
    quiz: q,
    analise: {
      compensacaoAssimetria: comp,
      analiseFrenja: { situacao: q.franja, sugestao: franjaMap[q.franja] },
      analiseLinhas: linhasMap[q.linhasRosto],
      analiseBiotipo: corpoMap[q.biotipo],
      linhasCorpo: q.linhasCorpo
    }
  };
  renderCards(S.resultado);
}

function renderCards(res) {
  const c = document.getElementById('cards-resultado'); c.innerHTML = '';
  const a = res.analise;

  // Mostrar as 3 faces
  mkCard(c, 'Sua Análise Visual', `
    <div style="display:flex; gap:8px; justify-content:center; margin-bottom:16px;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;">
        <img src="${res.imagens.ladoDireitoDuplicado}" style="width:100%; border-radius:8px; border:1px solid #222;">
        <span style="font-size:0.65rem; color:#555; text-align:center;">Lado Direito<br>Duplicado</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;">
        <img src="${res.imagens.original}" style="width:100%; border-radius:8px; border:1px solid #222;">
        <span style="font-size:0.65rem; color:#555; text-align:center;">Você</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;">
        <img src="${res.imagens.ladoEsquerdoDuplicado}" style="width:100%; border-radius:8px; border:1px solid #222;">
        <span style="font-size:0.65rem; color:#555; text-align:center;">Lado Esquerdo<br>Duplicado</span>
      </div>
    </div>
  `);

  mkCard(c,'Compensação de Assimetria',`<p><span class="tag">${a.compensacaoAssimetria.efeito}</span></p><p>${a.compensacaoAssimetria.explicacao}</p>`);
  if (a.analiseFrenja.sugestao) mkCard(c,'Análise de Franja',`<p>${a.analiseFrenja.sugestao}</p>`);
  mkCard(c,'Suas Linhas do Rosto — '+a.analiseLinhas.classe,`<p><span class="tag">Atenção</span> ${a.analiseLinhas.alerta}</p><p><span class="tag">Sugestão</span> ${a.analiseLinhas.sugestao}</p>`);
  mkCard(c,'Seu Biotipo',`<p>${a.analiseBiotipo}</p><p style="margin-top:8px; font-size:0.8rem; color:#888;">Linhas do corpo: <strong>${a.linhasCorpo}</strong></p>`);
  document.getElementById('json-raw').textContent = JSON.stringify({ quiz: res.quiz, analise: res.analise }, null, 2);
}
